# Phase 1: Baseline training config
# YOLOv8m-P2 on merged dataset at 1280px

imgsz: 1280
batch: 8
epochs: 150
optimizer: AdamW
lr0: 0.001
lrf: 0.01
warmup_epochs: 5
cos_lr: true

# Augmentation
copy_paste: 0.15
scale: 0.9
mosaic: 1.0
close_mosaic: 15
fliplr: 0.5
flipud: 0.0
hsv_h: 0.015
hsv_s: 0.7
hsv_v: 0.4
degrees: 0.0
translate: 0.1
mixup: 0.0

# Other
patience: 30
save_period: 10
workers: 8

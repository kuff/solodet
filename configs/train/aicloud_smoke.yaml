# Smoke test config for AI Cloud batch size sweep
# Batch size overridden by slurm/smoke_test.sh via --overrides batch=N

imgsz: 1280
batch: 2
epochs: 3
fraction: 0.01
optimizer: AdamW
lr0: 0.001
lrf: 0.01
warmup_epochs: 1
cos_lr: true

# Minimal augmentation for speed
mosaic: 1.0
close_mosaic: 0
fliplr: 0.5
flipud: 0.0
scale: 0.5
copy_paste: 0.0
mixup: 0.0

# Other
patience: 0
save_period: 0
workers: 8

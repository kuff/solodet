# Full training config for AI Cloud (A40 48GB)
# Set batch size after smoke test results

imgsz: 1280
batch: 16
epochs: 150
fraction: 1.0
optimizer: AdamW
lr0: 0.001
lrf: 0.01
warmup_epochs: 5
cos_lr: true

# Augmentation (same as baseline)
copy_paste: 0.15
scale: 0.9
mosaic: 1.0
close_mosaic: 15
fliplr: 0.5
flipud: 0.0
hsv_h: 0.015
hsv_s: 0.7
hsv_v: 0.4
degrees: 0.0
translate: 0.1
mixup: 0.0

# Other
patience: 30
save_period: 10
workers: 16
